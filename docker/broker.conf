# replace 192.168.1.1 to real server ip

brokerClusterName = DefaultCluster  # 集群名称
brokerName = broker-192.168.1.1  # Broker名称（主从同名）
brokerId = 0                        # =Master，>0=Slave
namesrvAddr = 0.0.0.0:55002         # NameServer地址
brokerRole = ASYNC_MASTER           # 角色：ASYNC_MASTER/SYNC_MASTER/SLAVE
flushDiskType = ASYNC_FLUSH         # 刷盘方式：ASYNC_FLUSH/SYNC_FLUSH

storePathRootDir = /store                             # 存储根目录
storePathCommitLog = /store/commitlog                # CommitLog路径
mapedFileSizeCommitLog = 1073741824                   # 单个CommitLog文件大小（1GB）
diskMaxUsedSpaceRatio = 75                            # 磁盘使用率上限（超过停止写入）

sendMessageThreadPoolNums = 32      # 发送消息线程数
pullMessageThreadPoolNums = 32       # 拉取消息线程数